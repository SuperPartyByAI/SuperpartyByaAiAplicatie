##############################################################################
# nginx config: wa.superparty.ro (voice + WhatsApp backend)
# Last updated: 2026-03-06 — added /api/voip-ws WebSocket upgrade block
#
# Deploy: scp this file to /etc/nginx/sites-enabled/wa.superparty.ro on VPS
# then: nginx -t && nginx -s reload
##############################################################################

server {
    server_name wa.superparty.ro;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    # ── VoIP WebSocket — MUST come before /api/ to avoid swallowing upgrade ──
    location /api/voip-ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 30m;
    }

    location /messages/ {
        proxy_pass http://127.0.0.1:3001/messages/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 30m;
    }

    location = /metrics {
        proxy_pass http://127.0.0.1:3001/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /debug/ {
        proxy_pass         http://127.0.0.1:3001/debug/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wa.superparty.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.superparty.ro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = wa.superparty.ro) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name wa.superparty.ro;
    return 404;
}
