name: CI — Smoke Tests (WA Outbox + Voice + Syntax)

# CI Supabase: IZOLAT de prod — foloseste CI_SUPABASE_URL (project separat)
# URL: https://vpacynuyljmiatcqemho.supabase.co (Frankfurt, free tier)
# Schema: outbox_messages + voice_calls + claim_outbox_batch identice cu prod (fara date reale)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-outbox:
    name: WA Outbox Validation (7 scenarii)
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify CI Supabase isolation
        run: |
          # Confirma ca nu se foloseste URL-ul de prod
          PROD_URL="ilkphpidhuytucxlglqi.supabase.co"
          CI_URL="${{ secrets.CI_SUPABASE_URL }}"
          if echo "$CI_URL" | grep -q "$PROD_URL"; then
            echo "❌ CRITICAL: CI foloseste Supabase PROD! Oprire imediata."
            exit 1
          fi
          echo "✅ CI izolat de prod: $CI_URL"

      - name: Run outbox validation
        id: outbox-run
        run: node .github/scripts/validate-outbox.mjs

      - name: Cleanup CI rows (always runs)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_KEY }}
        run: |
          node -e "
          const url=process.env.SUPABASE_URL+'/rest/v1/outbox_messages?account_id=like.ci-%25';
          fetch(url,{method:'DELETE',headers:{apikey:process.env.SUPABASE_SERVICE_KEY,Authorization:'Bearer '+process.env.SUPABASE_SERVICE_KEY}})
            .then(r=>console.log('Cleanup status:',r.status))
            .catch(e=>console.error('Cleanup error:',e));
          " 2>/dev/null || echo 'cleanup best-effort'

  smoke-voice:
    name: Voice Endpoints Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify voice server integrity
        run: |
          echo "=== Voice server integrity check ==="
          test -f server/voice-service/index.js && echo "✅ index.js" || { echo "❌ MISSING index.js"; exit 1; }
          test -f server/voice-service/package.json && echo "✅ package.json" || { echo "❌ MISSING package.json"; exit 1; }
          test -f server/voice-service/Dockerfile && echo "✅ Dockerfile" || { echo "❌ MISSING Dockerfile"; exit 1; }
          test -f server/voice-service/supabase-sync.mjs && echo "✅ supabase-sync.mjs" || { echo "❌ MISSING supabase-sync"; exit 1; }
          grep -q "pruneStaleZsetMembers" server/voice-service/index.js && echo "✅ ZSET prune" || { echo "❌ ZSET prune MISSING"; exit 1; }
          grep -q "setActiveCall" server/voice-service/index.js && echo "✅ Redis state" || { echo "❌ Redis state MISSING"; exit 1; }
          grep -q "activeCallsMap.set" server/voice-service/index.js && { echo "❌ STALE activeCallsMap.set found!"; exit 1; } || echo "✅ no stale map"
          grep -q "ioredis" server/voice-service/package.json && echo "✅ ioredis în deps" || { echo "❌ ioredis MISSING"; exit 1; }
          grep -q "ilkphpidhuytucxlglqi" server/voice-service/supabase-sync.mjs && { echo "❌ hardcoded Supabase URL!"; exit 1; } || echo "✅ no hardcoded Supabase URL"
          # Voice persistence checks
          grep -q "upsertVoiceCall" server/voice-service/index.js && echo "✅ upsertVoiceCall present" || { echo "❌ upsertVoiceCall MISSING"; exit 1; }
          grep -q "resolveCallIdentities" server/voice-service/index.js && echo "✅ resolveCallIdentities present" || { echo "❌ resolveCallIdentities MISSING"; exit 1; }
          grep -q "voice_calls" server/voice-service/index.js && echo "✅ voice_calls table reference" || { echo "❌ voice_calls table reference MISSING"; exit 1; }
          test -f server/voice-service/backfill-voice-calls.mjs && echo "✅ backfill script present" || { echo "❌ backfill-voice-calls.mjs MISSING"; exit 1; }
          echo "✅ Voice integrity: ALL PASSED"

  smoke-voice-persistence:
    name: Voice Persistence Smoke (6 scenarii)
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify CI Supabase isolation
        run: |
          PROD_URL="ilkphpidhuytucxlglqi.supabase.co"
          CI_URL="${{ secrets.CI_SUPABASE_URL }}"
          if echo "$CI_URL" | grep -q "$PROD_URL"; then
            echo "❌ CRITICAL: CI foloseste Supabase PROD! Oprire imediata."
            exit 1
          fi
          echo "✅ CI izolat de prod: $CI_URL"
      - name: Run voice persistence validation
        run: node .github/scripts/validate-voice-persistence.mjs

  lint-check:
    name: JS Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check all critical server files
        run: |
          echo "=== JS Syntax Check ==="
          node --check server/whatsapp/workers/wa-outbox-api.mjs && echo "✅ wa-outbox-api.mjs"
          node --check server/whatsapp/workers/wa-outbox-worker.mjs && echo "✅ wa-outbox-worker.mjs"
          node --check server/whatsapp/reconciler/wa-reconciler.mjs && echo "✅ wa-reconciler.mjs"
          node --check server/voice-service/supabase-sync.mjs && echo "✅ supabase-sync.mjs"
          echo "✅ Syntax: ALL PASSED"
