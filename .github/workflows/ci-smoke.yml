name: CI — Smoke Tests (WA Outbox + Voice)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-outbox:
    name: WA Outbox Validation (7 scenarii)
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run outbox validation via Node.js
        run: node .github/scripts/validate-outbox.mjs

  smoke-voice:
    name: Voice Endpoints Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate voice server files
        run: |
          echo "Checking key voice server files..."
          test -f server/voice/index.js && echo "✅ server/voice/index.js" || { echo "❌ MISSING"; exit 1; }
          grep -q "pruneStaleZsetMembers" server/voice/index.js && echo "✅ ZSET prune cron" || echo "⚠️ ZSET prune missing"
          grep -q "Redis" server/voice/index.js && echo "✅ Redis present" || echo "⚠️  Redis not found"
          echo "Voice check complete."

  lint-check:
    name: JS Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check outbox files
        run: |
          node --check server/whatsapp/workers/wa-outbox-api.mjs && echo "✅ wa-outbox-api.mjs"
          node --check server/whatsapp/workers/wa-outbox-worker.mjs && echo "✅ wa-outbox-worker.mjs"
