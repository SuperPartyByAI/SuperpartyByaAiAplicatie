# Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # TODO: Configurează Alertmanager dacă vrei notificări email/Slack
      # - targets: ['alertmanager:9093']

scrape_configs:
  # ─── Prometheus self-monitoring ─────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ─── Node Exporter (CPU, RAM, Disk) ─────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── SuperParty Backend (/metrics endpoint) ─────────────────
  - job_name: superparty-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3001"]
        labels:
          service: superparty-backend
          env: production
    # Fallback dacă host.docker.internal nu merge:
    # - targets: ["172.17.0.1:3001"]

  # ─── Caddy Metrics (dacă e activat) ─────────────────────────
  # Caddy expune metrics implicit pe :2019/metrics
  # Decomentează dacă Caddy rulează pe host (nu în Docker)
  # - job_name: caddy
  #   static_configs:
  #     - targets: ["host.docker.internal:2019"]
