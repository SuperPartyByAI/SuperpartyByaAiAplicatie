# SuperParty — fail2ban Configuration
#
# INSTALL:
#   sudo apt install fail2ban
#   sudo cp fail2ban-superparty.conf /etc/fail2ban/jail.d/superparty.conf
#   sudo systemctl restart fail2ban
#
# CHECK:
#   sudo fail2ban-client status
#   sudo fail2ban-client status sshd
#   sudo fail2ban-client status caddy-auth

# ─── SSH Protection ─────────────────────────────────────────
[sshd]
enabled  = true
port     = ssh
filter   = sshd
logpath  = /var/log/auth.log
maxretry = 5
bantime  = 3600
findtime = 600
action   = %(action_mwl)s

# ─── Caddy: Rate Abuse / Auth Failures ──────────────────────
[caddy-auth]
enabled  = true
port     = http,https
filter   = caddy-auth
logpath  = /var/log/caddy/access.log
maxretry = 10
bantime  = 600
findtime = 300

# ─── Caddy: 4xx Abuse (brute force API) ─────────────────────
[caddy-4xx]
enabled  = true
port     = http,https
filter   = caddy-4xx
logpath  = /var/log/caddy/access.log
maxretry = 30
bantime  = 600
findtime = 300
