##############################################################################
# Nginx config TEMPLATE for wa.superparty.ro
# DO NOT commit secrets; this file has no credentials.
# Live config: /etc/nginx/sites-enabled/wa.superparty.ro on 89.167.115.150
# Certbot manages SSL directives (added automatically on server).
##############################################################################

server {
    server_name wa.superparty.ro;

    # ── ACME challenge (certbot) ───────────────────────────────────────────
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # ── Health (public) ───────────────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API (Firebase Bearer protected in app) ───────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 30m;
    }

    # ── Media messages ───────────────────────────────────────────────────
    location /messages/ {
        proxy_pass         http://127.0.0.1:3001/messages/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 30m;
    }

    # ── Prometheus metrics (ADMIN_TOKEN protected in app) ────────────────
    location = /metrics {
        proxy_pass http://127.0.0.1:3001/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Admin debug endpoints (ADMIN_TOKEN protected in app) ─────────────
    # Available: /debug/queue-stats  /debug/dlq  /debug/dlq/replay  /debug/recent-messages
    location /debug/ {
        proxy_pass         http://127.0.0.1:3001/debug/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # SSL — managed by Certbot (added automatically on server)
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/wa.superparty.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.superparty.ro/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirect (managed by Certbot)
server {
    listen 80;
    server_name wa.superparty.ro;
    if ($host = wa.superparty.ro) {
        return 301 https://$host$request_uri;
    }
    return 404;
}
