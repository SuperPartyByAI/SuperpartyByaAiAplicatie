version: "3.8"
services:
  superparty-voice:
    build:
      context: ../../server/voice-service
      dockerfile: Dockerfile
    container_name: superparty-voice
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
