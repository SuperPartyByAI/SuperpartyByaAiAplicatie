# voice.superparty.ro — nginx config live
# Place in: /etc/nginx/sites-available/voice.superparty.ro.conf
# VPS: 91.98.16.90

server {
    listen 80;
    server_name voice.superparty.ro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name voice.superparty.ro;

    ssl_certificate /etc/letsencrypt/live/voice.superparty.ro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voice.superparty.ro/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
